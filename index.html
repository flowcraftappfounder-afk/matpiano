<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Piano Mat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  #header {
    padding: 12px 16px 8px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; z-index: 10;
  }
  #header h1 { font-size: 15px; font-weight: 500; }
  #status { font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; }
  #dot { width: 6px; height: 6px; border-radius: 50%; background: #444; transition: background 0.3s; }
  #dot.on { background: #22c55e; }
  #dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  #wrap { position: relative; flex: 1; overflow: hidden; }
  #video { display: none; width: 1px; height: 1px; position: absolute; }
  #main-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #keys-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 130px; display: flex; pointer-events: none;
  }
  .key {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    border-top: none;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 10px; transition: background 0.05s;
  }
  .key.active { background: rgba(120,80,255,0.5); border-color: rgba(160,120,255,0.8); }
  .key span { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.35); }
  .key.active span { color: #fff; }
  #btn {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 14px; color: #fff;
    font-size: 15px; font-family: inherit; font-weight: 500;
    padding: 14px 28px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #note {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 48px; font-weight: 300;
    opacity: 0; transition: opacity 0.1s;
    pointer-events: none;
  }
  #note.show { opacity: 1; }
  #info {
    position: absolute; bottom: 145px; left: 16px;
    font-size: 11px; color: rgba(255,255,255,0.3);
    line-height: 1.6; display: none;
  }
</style>
</head>
<body>
<div id="header">
  <h1>Piano Mat</h1>
  <div id="status"><div id="dot"></div><span id="stxt">listo</span></div>
</div>
<div id="wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="main-canvas"></canvas>
  <div id="keys-bar"></div>
  <button id="btn">Activar cámara</button>
  <div id="note"></div>
  <div id="info"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script>
const NOTES = ['Do','Re','Mi','Fa','Sol','La','Si','Do+'];
const FREQS = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25];
const TIPS = [4,8,12,16,20];

let audio, keysEl = [], activeKeys = new Set(), noteTimers = {};
let canvas, ctx, video, hands;
let noteTimer2 = null;
let running = false;

function $(id){ return document.getElementById(id); }

function initAudio(){
  if(!audio) audio = new (window.AudioContext||window.webkitAudioContext)();
}

function playNote(i){
  if(!audio) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.connect(g); g.connect(audio.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(FREQS[i], audio.currentTime);
  g.gain.setValueAtTime(0.4, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime+1.2);
  o.start(); o.stop(audio.currentTime+1.2);
}

function buildKeys(){
  const bar = $('keys-bar');
  NOTES.forEach(n => {
    const k = document.createElement('div');
    k.className = 'key';
    k.innerHTML = `<span>${n}</span>`;
    bar.appendChild(k);
    keysEl.push(k);
  });
}

function getZones(){
  const wr = $('wrap').getBoundingClientRect();
  return keysEl.map((k,i)=>{
    const r = k.getBoundingClientRect();
    return {x:r.left-wr.left, y:r.top-wr.top, w:r.width, h:r.height, i};
  });
}

function setupCanvas(){
  canvas = $('main-canvas');
  video = $('video');
  ctx = canvas.getContext('2d');
  const resize = ()=>{
    const wr = $('wrap');
    canvas.width = wr.offsetWidth;
    canvas.height = wr.offsetHeight;
  };
  resize();
  window.addEventListener('resize', resize);
}

// Off-screen canvas to feed MediaPipe — key fix for iOS
let offscreen = null;
let offCtx = null;

function getOffscreen(w, h){
  if(!offscreen){ offscreen = document.createElement('canvas'); }
  if(offscreen.width !== w || offscreen.height !== h){
    offscreen.width = w; offscreen.height = h;
  }
  if(!offCtx) offCtx = offscreen.getContext('2d');
  return {offscreen, offCtx};
}

async function startCamera(){
  initAudio();
  $('btn').style.display = 'none';
  $('dot').className = 'loading';
  $('stxt').textContent = 'iniciando…';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: 'environment' }, width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(e){
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }, audio: false
      });
      video.srcObject = stream;
      await video.play();
    } catch(e2){
      $('stxt').textContent = 'error';
      $('btn').style.display = 'block';
      return;
    }
  }

  $('info').style.display = 'block';

  hands = new Hands({
    locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({
    maxNumHands:2, modelComplexity:1,
    minDetectionConfidence:0.7, minTrackingConfidence:0.6
  });
  hands.onResults(onResults);

  $('dot').className = 'on';
  $('stxt').textContent = 'detectando…';
  running = true;
  loop();
}

async function loop(){
  if(!running) return;
  if(video.readyState >= 2){
    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;
    // Draw video to offscreen canvas — MediaPipe reads from here, NOT from video directly
    const {offscreen, offCtx} = getOffscreen(vw, vh);
    offCtx.drawImage(video, 0, 0, vw, vh);
    await hands.send({image: offscreen});
  }
  requestAnimationFrame(loop);
}

function showNote(name){
  const el = $('note');
  el.textContent = name;
  el.classList.add('show');
  if(noteTimer2) clearTimeout(noteTimer2);
  noteTimer2 = setTimeout(()=>el.classList.remove('show'), 800);
}

function onResults(results){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // Draw video frame onto main canvas
  ctx.drawImage(video, 0, 0, W, H);

  const zones = getZones();
  const nowActive = new Set();
  let fingers = 0;

  if(results.multiHandLandmarks){
    results.multiHandLandmarks.forEach(lms => {
      const CONN = [
        [0,1],[1,2],[2,3],[3,4],
        [0,5],[5,6],[6,7],[7,8],
        [5,9],[9,10],[10,11],[11,12],
        [9,13],[13,14],[14,15],[15,16],
        [13,17],[17,18],[18,19],[19,20],[0,17]
      ];
      ctx.strokeStyle = 'rgba(150,100,255,0.5)';
      ctx.lineWidth = 2;
      CONN.forEach(([a,b])=>{
        ctx.beginPath();
        ctx.moveTo(lms[a].x*W, lms[a].y*H);
        ctx.lineTo(lms[b].x*W, lms[b].y*H);
        ctx.stroke();
      });
      lms.forEach((lm,li)=>{
        const x=lm.x*W, y=lm.y*H;
        const tip = TIPS.includes(li);
        ctx.beginPath();
        ctx.arc(x,y,tip?9:4,0,Math.PI*2);
        ctx.fillStyle = tip ? 'rgba(200,150,255,0.95)' : 'rgba(255,255,255,0.5)';
        ctx.fill();
        if(tip){
          fingers++;
          zones.forEach(z=>{
            if(x>=z.x && x<=z.x+z.w && y>=z.y && y<=z.y+z.h) nowActive.add(z.i);
          });
        }
      });
    });
  }

  $('info').textContent = results.multiHandLandmarks
    ? `manos: ${results.multiHandLandmarks.length}  dedos: ${fingers}`
    : 'buscando manos…';

  nowActive.forEach(i=>{
    if(!activeKeys.has(i)){
      playNote(i); showNote(NOTES[i]);
      keysEl[i].classList.add('active');
      if(noteTimers[i]) clearTimeout(noteTimers[i]);
      noteTimers[i] = setTimeout(()=>activeKeys.delete(i), 300);
    }
  });
  activeKeys.forEach(i=>{ if(!nowActive.has(i)) keysEl[i].classList.remove('active'); });
  activeKeys = nowActive;
}

buildKeys();
setupCanvas();
$('btn').addEventListener('click', startCamera);
$('dot').classList.add('on');
</script>
</body>
</html>
